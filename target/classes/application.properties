
# ==========================================
# 1. Configuración de PostgreSQL (JPA)
# ==========================================
# Configuración de la Base de Datos con Muescas de Seguridad
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/MiHorario}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate para actualizar las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# 2. Configuración de Redis (Caché Distribuida)
# ==========================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# 3. Puerto del Servidor
server.port=${PORT:8081}

#4. Configuracion del Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method


# ==========================================
# 5. Configuración del Punto 20: I18N (Internacionalización)
# ==========================================
# Especifica que el archivo base de traducciones está en src/main/resources/messages.properties
spring.messages.basename=messages
spring.messages.encoding=UTF-8
# Si viene un idioma que no tenemos (ej. Francés), usa por defecto el Español (messages.properties)
spring.messages.fallback-to-system-locale=true

# ==========================================
# 6. Credenciales del Servicio Externo (SendGrid)
# ==========================================
# Busca la variable de entorno del sistema, si no, usa una vacía por defecto

sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:}

# ==========================================
# 7. Configuración de Spring Boot Actuator (Monitoreo)
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ==========================================
# 8. Configuración de OAuth2 Resource Server (JWT Issuer)
# ==========================================
# URL del emisor de tokens del Proveedor de Identidad Federado (Keycloak, Auth0, Google, etc.)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:https://dev-placeholder.us.auth0.com/}

