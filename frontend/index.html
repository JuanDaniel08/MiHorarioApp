<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiHorarioApp - Panel Coordinador</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="bg-white shadow-xl rounded-2xl p-8 max-w-lg w-full border border-gray-200">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">🗓️ MiHorarioApp</h1>
            <select id="langSelect" class="bg-gray-50 border border-gray-300 rounded-lg p-1 text-sm text-gray-600">
                <option value="es">🇪🇸 ES</option>
                <option value="en">🇺🇸 EN</option>
            </select>
        </div>
        
        <p class="text-sm text-gray-500 mb-6">Panel del Coordinador - Registro de Turnos de Limpieza</p>

        <form id="shiftForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Zona de Limpieza (UUID)</label>
                <input type="text" id="cleaningZone" value="d3b07384-d113-49cd-a5d6-8ee0201e5123" required
                    class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Empleado (UUID)</label>
                <input type="text" id="employee" value="a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d" required
                    class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Inicio</label>
                    <input type="date" id="startDate" value="2026-05-25" required
                        class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha Fin</label>
                    <input type="date" id="endDate" value="2026-05-30" required
                        class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
            </div>

            <hr class="border-gray-200 my-4">

            <div class="bg-blue-50 p-4 rounded-xl space-y-3 border border-blue-100">
                <span class="text-xs font-bold text-blue-700 uppercase tracking-wider block">⚙️ Parámetros de Seguridad</span>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Identity Provider Token (Rol)</label>
                    <select id="authRole" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-xs">
                        <option value="Bearer token-valid-coordinador">Valid JWT Token (ROLE_COORDINADOR)</option>
                        <option value="Bearer token-invalid-empleado">Invalid JWT Token (ROLE_EMPLEADO -> dará 403)</option>
                        <option value="">Sin Autenticación (Falta Token -> dará 401)</option>
                    </select>
                </div>

                <div class="flex items-center justify-between pt-1">
                    <label class="text-xs font-semibold text-gray-600">reCAPTCHA v3 (Token Invisible)</label>
                    <span class="inline-flex items-center rounded-md bg-green-50 px-2 py-1 text-xs font-medium text-green-700 ring-1 ring-inset ring-green-600/20">✓ Score: 0.9</span>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg p-3 text-sm transition-colors cursor-pointer shadow-md">
                Guardar Turno Seguro
            </button>
        </form>

        <div id="responseBox" class="mt-6 p-4 rounded-xl text-xs font-mono hidden">
            <p class="font-bold mb-1" id="responseStatus"></p>
            <pre id="responseBody" class="white-space-pre-wrap"></pre>
        </div>
    </div>

    <script>
        document.getElementById('shiftForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const responseBox = document.getElementById('responseBox');
            const responseStatus = document.getElementById('responseStatus');
            const responseBody = document.getElementById('responseBody');
            
            // Ocultar caja anterior
            responseBox.className = "mt-6 p-4 rounded-xl text-xs font-mono hidden";

            // Armar el JSON que espera tu caso de uso
            const payload = {
                cleaningZoneId: document.getElementById('cleaningZone').value,
                employeeId: document.getElementById('employee').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value
            };

            // Capturar cabeceras de seguridad
            const authHeader = document.getElementById('authRole').value;
            const lang = document.getElementById('langSelect').value;

            try {
                // 🚀 Apuntamos al API GATEWAY de NGINX (Puerto 9000 o 443 si tienes SSL activo)
                const response = await fetch('https://localhost:9000/api/v1/shifts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/center.json', // Cambia a 'application/json' si tu backend usa el estándar directo
                        'Content-Type': 'application/json',
                        'Authorization': authHeader,
                        'Accept-Language': lang,
                        'X-Captcha-Token': 'google-recaptcha-v3-token-valid'
                    },
                    body: JSON.stringify(payload)
                });

                // Mostrar respuesta en pantalla estética
                responseBox.classList.remove('hidden');
                if (response.ok) {
                    responseBox.classList.add('bg-green-50', 'text-green-800', 'border', 'border-green-200');
                    responseStatus.innerText = `Status: ${response.status} Created 🎉`;
                    responseBody.innerText = lang === 'es' ? "El turno ha sido registrado exitosamente para la zona de limpieza." : "The shift has been successfully registered for the cleaning zone.";
                } else {
                    responseBox.classList.add('bg-red-50', 'text-red-800', 'border', 'border-red-200');
                    responseStatus.innerText = `Status: ${response.status} ${response.statusText}`;
                    responseBody.innerText = await response.text() || "Acceso denegado por políticas de la arquitectura (WAF/Roles).";
                }

            } catch (error) {
                responseBox.classList.remove('hidden');
                responseBox.classList.add('bg-amber-50', 'text-amber-800', 'border', 'border-amber-200');
                responseStatus.innerText = "Error de Conexión";
                responseBody.innerText = "No se pudo conectar al API Gateway. Revisa si NGINX o Spring Boot están apagados.";
            }
        });
    </script>
</body>
</html>
