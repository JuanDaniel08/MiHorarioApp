# Base de datos H2 en memoria para evitar buscar Postgres en la nube
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuración ficticia para Redis local en los tests
spring.data.redis.host=localhost
spring.data.redis.port=6379

# URL de Keycloak falsa para que el Resource Server no falle al validar el token en el arranque
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://mock-keycloak.com/realms/mihorario-realm

# Credenciales de SendGrid mockeadas para los tests
sendgrid.api.key=mock-sendgrid-api-key
sendgrid.from.email=mock-sender@example.com

# Plantillas de notificaciones
template.shift.assigned.subject=Shift Assigned Notification
template.shift.assigned.body=Hello %s, you have been assigned to zone %s starting at %s.
